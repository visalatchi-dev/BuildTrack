{% extends 'tracker/base.html' %}
{% block content %}

<div class="page-header" style="margin-bottom: 20px;">
  <div class="page-title">Mark Attendance for All Workers</div>
</div>
<form method="POST">
    {% csrf_token %}
<div class="table-wrap">
    <table style="width:100%; border-collapse: collapse;">
    <thead>
        <tr style="text-align: left; background-color: #1a1a1a;">
            <th style="padding: 10px;">Name</th>
            <th style="padding: 10px;">Role</th> <th style="padding: 10px;">Status</th>
        </tr>
    </thead>
    <tbody>
        {% for worker in workers %}
        <tr>
            <td style="padding: 10px;">{{ worker.name }}</td>
            <td style="padding: 10px;">{{ worker.role }}</td> <td style="padding: 10px;">
                <label style="margin-right: 15px;">
                    <input type="radio" name="worker_{{ worker.id }}" value="present" {% if worker.is_present %}checked{% endif %}> Present
                </label>
                <label>
                    <input type="radio" name="worker_{{ worker.id }}" value="absent" {% if not worker.is_present %}checked{% endif %}> Absent
                </label>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
    
    <div style="margin-top:20px;">
        <button type="submit" style="background:#1D9E75; color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer;">
            Save All Attendance
        </button>
        <a href="{% url 'workers' %}" style="background:#dc3545; color:white; padding:10px 20px; border-radius:6px; text-decoration:none; margin-left:10px;">
            Cancel
        </a>
    </div>
</form>
{% endblock %}
