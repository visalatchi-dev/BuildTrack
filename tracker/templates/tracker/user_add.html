{% extends 'tracker/base.html' %}
{% block content %}

<div class="page-header">
  <div class="page-title" style="margin:0;">Add New User</div>
</div>

<div style="display:flex;justify-content:center;">
  <div class="card" style="width:100%;max-width:520px;">

    {% if error %}
    <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:7px;padding:10px 14px;font-size:13px;color:#FCA5A5;margin-bottom:16px;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div style="font-size:11px;font-weight:600;color:#1D9E75;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;">Login Details</div>

      <div class="form-group">
        <label>Username</label>
        <input name="username" type="text" placeholder="e.g. rajesh_k" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" placeholder="Enter password" required/>
      </div>

      <div style="font-size:11px;font-weight:600;color:#1D9E75;letter-spacing:.06em;text-transform:uppercase;margin:20px 0 12px;">Worker Details</div>

      <div class="form-group">
        <label>Full Name</label>
        <input name="worker_name" type="text" placeholder="e.g. Rajesh Kumar" required/>
      </div>

      <div class="form-group">
        <label>Role</label>
        <select name="role" id="role-select" onchange="toggleProject()">
          <option value="Worker">Worker</option>
          <option value="Supervisor">Supervisor</option>
        </select>
      </div>

      <div id="project-section">
        <div class="form-group">
          <label>Assign Project</label>
          <select name="project">
            <option value="">-- Select Project --</option>
            {% for p in projects %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="modal-actions" style="margin-top:20px;">
        <a href="/users/" class="btn-cancel" style="text-align:center;text-decoration:none;">Cancel</a>
        <button type="submit" class="btn-save">Create User</button>
      </div>
    </form>
  </div>
</div>

<script>
function toggleProject(){
  var role = document.getElementById('role-select').value;
  document.getElementById('project-section').style.display = (role === 'Viewer') ? 'none' : 'block';
}
</script>

{% endblock %}
